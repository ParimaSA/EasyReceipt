version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: easyreceipt_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: easyreceipt
      MYSQL_USER: easyreceipt
      MYSQL_PASSWORD: easyreceipt123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easyreceipt_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://easyreceipt:easyreceipt123@db:3306/easyreceipt
      SECRET_KEY: change-this-in-production-use-openssl-rand-hex-32
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:80"]'
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easyreceipt_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  uploads:
